syntax = "proto3";

package message;

option go_package = "protocol/pb;pb";

message HandshakeRequest {
    string version = 1;
    bool secret = 2;
    string key_finger = 3;
    repeated string capabilities = 4;
}
message HandshakeResponse {
    string version = 1;
    bool secret = 2;
    bytes public_key = 3;
    string key_finger = 4;
    repeated string capabilities = 5;
}
message SecretHandshakeRequest {
    string token = 1;
    bytes key = 2;
}
message RegistrationRequest {
    string token = 1;
    string device_id = 2;
    string name = 3;
    bool is_fast = 4;
    string version = 5;
    fixed32 virtual_ip = 6;
    bool allow_ip_change = 7;
    bool client_secret = 8;
    bytes client_secret_hash = 9;
}

message RegistrationResponse {
    fixed32 virtual_ip = 1;
    fixed32 virtual_gateway = 2;
    fixed32 virtual_netmask = 3;
    uint32 epoch = 4;
    repeated DeviceInfo device_info_list = 5;
    fixed32 public_ip = 6;
    uint32 public_port = 7;
    bytes public_ipv6 = 8;
    GatewayAccessGrant gateway_access_grant = 9;
}
message GatewayAccessGrant {
    repeated string gateway_addrs = 1;
    string gateway_server_name = 2;
    bytes gateway_ca_pem = 3;
    string ticket = 4;
    int64 ticket_expire_unix_ms = 5;
    uint64 session_id = 6;
    uint64 policy_rev = 7;
}
message GatewayConnectHello {
    string device_id = 1;
    fixed32 virtual_ip = 2;
    uint64 session_id = 3;
    string ticket = 4;
    bytes nonce = 5;
    int64 client_time_unix_ms = 6;
}
message GatewayConnectAck {
    bool ok = 1;
    string reason = 2;
    uint64 session_id = 3;
    uint32 negotiated_mtu = 4;
    uint32 keepalive_secs = 5;
}
message DeviceAuthRequest {
    string user_id = 1;
    string group = 2;
    string device_id = 3;
    string ticket = 4;
}
message DeviceAuthAck {
    bool ok = 1;
    string reason = 2;
    string user_id = 3;
    string group = 4;
    string device_id = 5;
}
message DeviceInfo {
    string name = 1;
    fixed32 virtual_ip = 2;
    uint32 device_status = 3;
    bool client_secret = 4;
    bytes client_secret_hash = 5;
    bool wireguard = 6;
}

message DeviceList {
    uint32 epoch = 1;
    repeated DeviceInfo device_info_list = 2;
}

message PunchInfo {
    repeated fixed32 public_ip_list = 2;
    uint32 public_port = 3;
    uint32 public_port_range = 4;
    PunchNatType nat_type = 5;
    bool reply = 6;
    fixed32 local_ip = 7;
    uint32 local_port = 8;
    bytes ipv6 = 9;
    uint32 ipv6_port = 10;
    uint32 tcp_port = 11;
    repeated uint32 udp_ports = 12;
    repeated uint32 public_ports = 13;
}
enum PunchNatType {
    Symmetric = 0;
    Cone = 1;
}
enum PunchResultCode {
    PunchResultUnknown = 0;
    PunchResultSuccess = 1;
    PunchResultFailed = 2;
    PunchResultTimeout = 3;
    PunchResultCanceled = 4;
}
message PunchEndpoint {
    fixed32 ip = 1;
    uint32 port = 2;
    bytes ipv6 = 3;
    bool tcp = 4;
}
message PunchRequest {
    uint64 session_id = 1;
    fixed32 source = 2;
    fixed32 target = 3;
    PunchNatType source_nat_type = 4;
    PunchNatType target_nat_type = 5;
    repeated PunchEndpoint source_endpoints = 6;
    repeated PunchEndpoint target_endpoints = 7;
    uint32 attempt = 8;
    uint32 timeout_ms = 9;
    int64 deadline_unix_ms = 10;
}
message PunchAck {
    uint64 session_id = 1;
    fixed32 source = 2;
    uint32 attempt = 3;
    bool accepted = 4;
    string reason = 5;
}
message PunchStart {
    uint64 session_id = 1;
    fixed32 source = 2;
    fixed32 target = 3;
    repeated PunchEndpoint peer_endpoints = 4;
    uint32 attempt = 5;
    uint32 timeout_ms = 6;
    int64 deadline_unix_ms = 7;
}
message PunchResult {
    uint64 session_id = 1;
    fixed32 source = 2;
    fixed32 target = 3;
    uint32 attempt = 4;
    PunchResultCode code = 5;
    string reason = 6;
    PunchEndpoint selected_endpoint = 7;
}
/// 向服务器上报客户端状态信息
message ClientStatusInfo {
    fixed32 source = 1;
    repeated RouteItem p2p_list = 2;
    uint64 up_stream = 3;
    uint64 down_stream = 4;
    PunchNatType nat_type = 5;
    repeated fixed32 public_ip_list = 6;
    repeated uint32 public_udp_ports = 7;
    repeated uint32 local_udp_ports = 8;
}
message RouteItem {
    fixed32 next_ip = 1;
}
