syntax = "proto3";

package message;

option go_package = "protocol/pb;pb";

message HandshakeRequest {
    string version = 1;
    string key_finger = 3;
    repeated string capabilities = 4;
}
message HandshakeResponse {
    string version = 1;
    bytes public_key = 3;
    string key_finger = 4;
    repeated string capabilities = 5;
}
message RegistrationRequest {
    string token = 1;
    string device_id = 2;
    string name = 3;
    bool is_fast = 4;
    string version = 5;
    fixed32 virtual_ip = 6;
    bool allow_ip_change = 7;
    bytes device_pub_key = 10;
    bytes online_kx_pub = 11;
}

message DnsProfile {
    repeated string servers = 1;
    repeated string match_domains = 2;
}

message DnsQueryRequest {
    uint64 request_id = 1;
    bytes query = 2;
}

message DnsQueryResponse {
    uint64 request_id = 1;
    bytes response = 2;
    string error = 3;
}

enum RegistrationErrorReason {
    REGISTRATION_ERROR_REASON_UNSPECIFIED = 0;
    REGISTRATION_ERROR_REASON_INVALID_GROUP_DOMAIN = 1;
    REGISTRATION_ERROR_REASON_NOT_AUTHED = 2;
    REGISTRATION_ERROR_REASON_INVALID_REQUEST = 3;
    REGISTRATION_ERROR_REASON_MISSING_HANDSHAKE_CAPABILITY = 4;
    REGISTRATION_ERROR_REASON_INTERNAL = 100;
}

message RegistrationResponse {
    fixed32 virtual_ip = 1;
    fixed32 virtual_gateway = 2;
    fixed32 virtual_netmask = 3;
    uint32 epoch = 4;
    repeated DeviceInfo device_info_list = 5;
    fixed32 public_ip = 6;
    uint32 public_port = 7;
    bytes public_ipv6 = 8;
    GatewayAccessGrant gateway_access_grant = 9;
    uint32 error_code = 10;
    string error_message = 11;
    DnsProfile dns_profile = 12;
    repeated GatewayAccessGrant gateway_access_grants = 13;
    uint64 gateway_policy_rev = 14;
    RegistrationErrorReason error_reason = 15;
}
enum GatewayChannelKind {
    GATEWAY_CHANNEL_UNKNOWN = 0;
    GATEWAY_CHANNEL_UDP = 1;
    GATEWAY_CHANNEL_QUIC = 2;
    GATEWAY_CHANNEL_HTTPS = 3;
}
message GatewayChannel {
    GatewayChannelKind kind = 1;
    string addr = 2;
    string server_name = 3;
    reserved 4;
}
message GatewayAccessGrant {
    bytes ticket = 1;
    int64 ticket_expire_unix_ms = 2;
    uint64 session_id = 3;
    uint64 policy_rev = 4;
    repeated string gateway_capabilities = 5;
    uint32 lease_secs = 6;
    uint32 grace_secs = 7;
    string gateway_group_id = 8;
    repeated GatewayChannel gateway_channels = 9;
    GatewayChannelKind default_gateway_channel = 10;
    bytes gateway_udp_public_key = 11;
    string gateway_udp_key_id = 12;
    string gateway_id = 13;
    int64 soft_refresh_after_unix_ms = 14;
    int64 hard_expire_unix_ms = 15;
}
message RefreshGatewayGrantRequest {
    fixed32 virtual_ip = 1;
    string device_id = 2;
    uint64 last_session_id = 3;
    uint64 last_policy_rev = 4;
    bool force_reissue = 5;
}
enum RefreshGatewayGrantResult {
    REFRESH_GATEWAY_GRANT_RESULT_UNSPECIFIED = 0;
    REFRESH_GATEWAY_GRANT_RESULT_UPDATED = 1;
    REFRESH_GATEWAY_GRANT_RESULT_NO_CHANGE = 2;
    REFRESH_GATEWAY_GRANT_RESULT_TEMPORARILY_UNAVAILABLE = 3;
    REFRESH_GATEWAY_GRANT_RESULT_REVOKED = 4;
}
message RefreshGatewayGrantResponse {
    bool has_update = 1;
    GatewayAccessGrant gateway_access_grant = 2;
    string reason = 3;
    repeated GatewayAccessGrant gateway_access_grants = 4;
    uint64 gateway_policy_rev = 5;
    RefreshGatewayGrantResult result = 6;
}
message GatewayTicketClaims {
    string ticket_id = 1;
    string device_id = 2;
    fixed32 virtual_ip = 3;
    uint64 session_id = 4;
    uint64 policy_revision = 5;
    repeated string gateway_ids = 6;
    string gateway_group_id = 7;
    int64 issued_at_unix_ms = 8;
    int64 not_before_unix_ms = 9;
    int64 expire_unix_ms = 10;
    uint32 lease_cap_secs = 11;
    uint32 grace_cap_secs = 12;
}
message SignedGatewayTicket {
    string alg = 1;
    string key_id = 2;
    bytes claims = 3;
    bytes signature = 4;
}
message GatewayReportRequest {
    string gateway_id = 1;
    repeated string capabilities = 2;
    int64 report_unix_ms = 3;
    bytes nonce = 4;
    bytes signature = 5;
    repeated GatewayChannel gateway_channels = 6;
    GatewayChannelKind default_gateway_channel = 7;
    bytes gateway_udp_public_key = 8;
    string gateway_udp_key_id = 9;
}
message GatewayReportProof {
    string gateway_id = 1;
    repeated string capabilities = 2;
    int64 report_unix_ms = 3;
    bytes nonce = 4;
    repeated GatewayChannel gateway_channels = 5;
    GatewayChannelKind default_gateway_channel = 6;
    bytes gateway_udp_public_key = 7;
    string gateway_udp_key_id = 8;
}
message GatewayReportAck {
    bool ok = 1;
    string reason = 2;
    string gateway_id = 3;
    int64 expire_unix_ms = 4;
}
message GatewayConnectHello {
    string device_id = 1;
    fixed32 virtual_ip = 2;
    uint64 session_id = 3;
    bytes ticket = 4;
    bytes nonce = 5;
    int64 client_time_unix_ms = 6;
    bool reauth = 10;
}
message GatewayConnectAck {
    bool ok = 1;
    string reason = 2;
    uint64 session_id = 3;
    uint32 negotiated_mtu = 4;
    uint32 keepalive_secs = 5;
    int64 lease_expire_unix_ms = 6;
    int64 grace_expire_unix_ms = 7;
    bool reauth_required = 8;
}
message DeviceAuthRequest {
    string user_id = 1;
    string group = 2;
    string device_id = 3;
    string ticket = 4;
    bytes device_pub_key = 5;
}
message DeviceAuthChallenge {
    string challenge_id = 1;
    bytes nonce = 2;
    int64 expire_unix_ms = 3;
    bool reauth_required = 4;
    string reason = 5;
}
message DeviceAuthProof {
    string challenge_id = 1;
    string device_id = 2;
    bytes device_pub_key = 3;
    bytes signature = 4;
}

enum DeviceAuthErrorReason {
    DEVICE_AUTH_ERROR_REASON_UNSPECIFIED = 0;
    DEVICE_AUTH_ERROR_REASON_CHALLENGE_EXPIRED = 1;
    DEVICE_AUTH_ERROR_REASON_DEVICE_KEY_MISMATCH = 2;
    DEVICE_AUTH_ERROR_REASON_INVALID_SIGNATURE = 3;
    DEVICE_AUTH_ERROR_REASON_AUTH_CHECK_FAILED = 4;
}

message DeviceAuthAck {
    bool ok = 1;
    string reason = 2;
    string user_id = 3;
    string group = 4;
    string device_id = 5;
    int64 auth_expire_unix_ms = 6;
    bool reauth_required = 7;
    DeviceAuthErrorReason error_reason = 8;
}
message DeviceRenameRequest {
    uint64 request_id = 1;
    string device_id = 2;
    string new_name = 3;
}
message DeviceRenameResponse {
    uint64 request_id = 1;
    bool ok = 2;
    string reason = 3;
    string applied_name = 4;
    bool pending_approval = 5;
}
message DebugCollectRequest {
    uint64 request_id = 1;
    repeated string sections = 2;
    string reason = 3;
}
message DebugCollectResponse {
    uint64 request_id = 1;
    bool ok = 2;
    string reason = 3;
    int64 collected_at_unix_ms = 4;
    string snapshot_json = 5;
}
message DebugWatchStartRequest {
    uint64 request_id = 1;
    repeated string sections = 2;
    uint32 duration_sec = 3;
    string reason = 4;
}
message DebugWatchStartResponse {
    uint64 request_id = 1;
    bool ok = 2;
    string reason = 3;
    uint64 watch_id = 4;
    int64 started_at_unix_ms = 5;
    int64 expire_at_unix_ms = 6;
}
message DebugWatchStopRequest {
    uint64 request_id = 1;
    uint64 watch_id = 2;
    string reason = 3;
}
message DebugWatchStopResponse {
    uint64 request_id = 1;
    bool ok = 2;
    string reason = 3;
    uint64 watch_id = 4;
    int64 stopped_at_unix_ms = 5;
}
message DebugWatchEvent {
    uint64 watch_id = 1;
    string section = 2;
    string event_type = 3;
    int64 event_unix_ms = 4;
    string payload_json = 5;
}
enum ChannelMode {
    CHANNEL_MODE_AUTO = 0;
    CHANNEL_MODE_DIRECT = 1;
    CHANNEL_MODE_RELAY = 2;
}

message DeviceInfo {
    string name = 1;
    fixed32 virtual_ip = 2;
    uint32 device_status = 3;
    string device_id = 7;
    bytes device_pub_key = 8;
    bytes online_kx_pub = 9;
    ChannelMode preferred_channel_mode = 10;
}

message DeviceList {
    uint32 epoch = 1;
    repeated DeviceInfo device_info_list = 2;
    repeated GatewayAccessGrant gateway_access_grants = 3;
    uint64 gateway_policy_rev = 4;
}

message PunchInfo {
    repeated fixed32 public_ip_list = 2;
    uint32 public_port = 3;
    uint32 public_port_range = 4;
    PunchNatType nat_type = 5;
    bool reply = 6;
    fixed32 local_ip = 7;
    uint32 local_port = 8;
    bytes ipv6 = 9;
    uint32 ipv6_port = 10;
    uint32 tcp_port = 11;
    repeated uint32 udp_ports = 12;
    repeated uint32 public_ports = 13;
}
enum PunchNatType {
    Symmetric = 0;
    Cone = 1;
}
enum PunchTriggerReason {
    PunchTriggerUnknown = 0;
    PunchTriggerStatusUpdate = 1;
    PunchTriggerRouteTimeout = 2;
    PunchTriggerReconnectRecovery = 3;
    PunchTriggerManualRequest = 4;
}
enum PunchSessionPhase {
    PunchPhaseUnknown = 0;
    PunchPhaseScheduled = 1;
    PunchPhaseSending = 2;
    PunchPhaseWaiting = 3;
    PunchPhaseSuccess = 4;
    PunchPhaseTimeout = 5;
    PunchPhaseFailed = 6;
}
enum PunchEndpointSelectionPolicy {
    PunchEndpointSelectionDefault = 0;
    PunchEndpointSelectionAll = 1;
    PunchEndpointSelectionPreferPublic = 2;
}
enum PunchResultCode {
    PunchResultUnknown = 0;
    PunchResultSuccess = 1;
    PunchResultFailed = 2;
    PunchResultTimeout = 3;
    PunchResultCanceled = 4;
    PunchResultRejected = 5;
    PunchResultNoResponse = 6;
    PunchResultSuperseded = 7;
}
message PunchEndpoint {
    fixed32 ip = 1;
    uint32 port = 2;
    bytes ipv6 = 3;
    bool tcp = 4;
}
message PunchRequest {
    uint64 session_id = 1;
    fixed32 source = 2;
    fixed32 target = 3;
    PunchNatType source_nat_type = 4;
    PunchNatType target_nat_type = 5;
    repeated PunchEndpoint source_endpoints = 6;
    repeated PunchEndpoint target_endpoints = 7;
    uint32 attempt = 8;
    uint32 timeout_ms = 9;
    int64 deadline_unix_ms = 10;
    PunchTriggerReason trigger_reason = 11;
    uint32 attempt_budget = 12;
    PunchEndpointSelectionPolicy endpoint_selection_policy = 13;
}
message PunchAck {
    uint64 session_id = 1;
    fixed32 source = 2;
    uint32 attempt = 3;
    bool accepted = 4;
    string reason = 5;
    PunchSessionPhase phase = 6;
}
message PunchStart {
    uint64 session_id = 1;
    fixed32 source = 2;
    fixed32 target = 3;
    repeated PunchEndpoint peer_endpoints = 4;
    uint32 attempt = 5;
    uint32 timeout_ms = 6;
    int64 deadline_unix_ms = 7;
    PunchTriggerReason trigger_reason = 8;
    uint32 attempt_budget = 9;
    PunchEndpointSelectionPolicy endpoint_selection_policy = 10;
}
message PunchResult {
    uint64 session_id = 1;
    fixed32 source = 2;
    fixed32 target = 3;
    uint32 attempt = 4;
    PunchResultCode code = 5;
    string reason = 6;
    PunchEndpoint selected_endpoint = 7;
    PunchSessionPhase phase = 8;
}
/// 向服务器上报客户端状态信息
message ClientStatusInfo {
    fixed32 source = 1;
    repeated RouteItem p2p_list = 2;
    uint64 up_stream = 3;
    uint64 down_stream = 4;
    PunchNatType nat_type = 5;
    reserved 6, 7, 8, 9;
    repeated PunchEndpoint public_udp_endpoints = 10;
    PunchTriggerReason punch_trigger_reason = 11;
    repeated PunchEndpoint local_udp_endpoints = 12;
    ChannelMode preferred_channel_mode = 13;
}
message RouteItem {
    fixed32 next_ip = 1;
}
