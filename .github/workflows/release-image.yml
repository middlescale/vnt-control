name: release-image

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Source ref to build (branch/tag/sha)"
        required: true
        default: "main"
      release_tag:
        description: "Image tag to publish"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/sdl-control
    steps:
      - name: Resolve build variables
        id: vars
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "source_ref=${{ inputs.source_ref }}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "source_ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.source_ref }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.server
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.release_tag }}
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

